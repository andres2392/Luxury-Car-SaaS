services:
  postgres:
    image: postgres:16-alpine
    container_name: luxury-car-saas-postgres
    environment:
      POSTGRES_DB: luxury_car_saas
      POSTGRES_USER: luxury_admin
      POSTGRES_PASSWORD: luxury_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luxury_admin -d luxury_car_saas"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
    container_name: luxury-car-saas-backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../backend/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://luxury_admin:luxury_password@postgres:5432/luxury_car_saas
      POSTGRES_SERVER: postgres
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
